services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: structureclaw-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: structureclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin 数据库管理
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: structureclaw-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@structureclaw.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-structureclaw}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: structureclaw-backend
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8000}
      - BACKEND_BODY_LIMIT_MB=${BACKEND_BODY_LIMIT_MB:-20}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/structureclaw
      - REDIS_URL=disabled
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-90000}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-0}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORE_PORT=${CORE_PORT:-8001}
      - ANALYSIS_ENGINE_URL=http://analysis-engine:${CORE_PORT:-8001}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        until npx prisma migrate deploy; do
          echo "Prisma migrate failed, retrying in 2s..."
          sleep 2
        done
        npm start
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # 分析引擎
  analysis-engine:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: structureclaw-analysis
    environment:
      - PYTHONUNBUFFERED=1
      - CORE_PORT=${CORE_PORT:-8001}
    ports:
      - "${CORE_PORT:-8001}:${CORE_PORT:-8001}"
    volumes:
      - ./core:/app
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: structureclaw-frontend
    environment:
      - PORT=${FRONTEND_PORT:-30000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-30000}:${FRONTEND_PORT:-30000}"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: structureclaw-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: structureclaw-network
