services:
  # 后端服务
  backend:
    # Windows Docker hosts default to windows/amd64 image pulls; stack images are Linux-only.
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE_REGISTRY_MIRROR: ${DOCKER_REGISTRY_MIRROR:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
    container_name: structureclaw-backend
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8000}
      - BACKEND_BODY_LIMIT_MB=${BACKEND_BODY_LIMIT_MB:-20}
      - DATABASE_URL=${DATABASE_URL:-file:/.runtime/data/structureclaw.db}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-180000}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-0}
      - ANALYSIS_PYTHON_BIN=${ANALYSIS_PYTHON_BIN:-/usr/bin/python3}
      - ANALYSIS_PYTHON_TIMEOUT_MS=${ANALYSIS_PYTHON_TIMEOUT_MS:-300000}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$${DATABASE_URL:-}" ] && [ "$${DATABASE_URL#file:}" = "$${DATABASE_URL}" ]; then
          echo "Invalid DATABASE_URL for Docker SQLite mode: $${DATABASE_URL}"
          echo "Expected a file: URL, for example file:/.runtime/data/structureclaw.db"
          exit 1
        fi
        retries=0
        max_retries=10
        until npm run db:deploy; do
          retries=$$((retries + 1))
          if [ "$$retries" -ge "$$max_retries" ]; then
            echo "Database sync failed after $$retries attempts, exiting."
            exit 1
          fi
          echo "Database sync failed, retrying in 2s... ($$retries/$$max_retries)"
          sleep 2
        done
        npm start
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./.runtime:/app/.runtime
      - ./.runtime/data:/.runtime/data
    restart: unless-stopped

  # 前端服务
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE_REGISTRY_MIRROR: ${DOCKER_REGISTRY_MIRROR:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: structureclaw-frontend
    environment:
      - PORT=${FRONTEND_PORT:-30000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-30000}:${FRONTEND_PORT:-30000}"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: structureclaw-network
