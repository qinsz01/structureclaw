id: yjk-drawing
domain: drawing
source: builtin
name:
  zh: YJK 出图
  en: YJK Drawing Export
description:
  zh: 调用 YJK 出图 API，根据结构模型与分析结果生成施工图纸。
  en: Invoke YJK drawing API to generate construction drawings from structural models and analysis results.
triggers:
  - YJK 出图
  - YJK drawing
  - yjk 施工图
  - yjk construction drawing
  - YJK 图纸
  - 盈建科出图
stages:
  - design
structureType: unknown
structuralTypeKeys: []
capabilities:
  - drawing-export
  - vendor-api-integration
requires: []
conflicts: []
autoLoadByDefault: false
priority: 80
compatibility:
  minRuntimeVersion: 0.1.0
  skillApiVersion: v1
software: yjk
supportedModelFamilies:
  - frame
  - shear-wall
  - frame-shear-wall
  - generic
materialFamilies:
  - concrete
  - steel
inputSchema:
  type: object
  properties:
    modelId:
      type: string
      description: Upstream normalized structural model identifier
    analysisResultId:
      type: string
      description: Analysis result identifier from a completed analysis skill
    codeCheckResultId:
      type: string
      description: Optional code-check result identifier
    drawingType:
      type: string
      enum:
        - plan
        - elevation
        - section
        - detail
        - reinforcement
    scale:
      type: string
      description: Drawing scale, e.g. '1:100'
    outputFormat:
      type: string
      enum:
        - dwg
        - dxf
        - pdf
  required:
    - modelId
    - drawingType
outputSchema:
  type: object
  properties:
    drawings:
      type: array
      items:
        type: object
        properties:
          fileRef:
            type: string
          drawingType:
            type: string
          format:
            type: string
          title:
            type: string
    metadata:
      type: object
      properties:
        drawingNumber:
          type: string
        scale:
          type: string
        generatedAt:
          type: string
aliases: []
toolHints: {}
