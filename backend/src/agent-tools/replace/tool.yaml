id: replace
source: builtin
tier: foundation
category: utility
enabledByDefault: true
displayName:
  zh: 文本替换
  en: Text Replace
description:
  zh: 在沙箱工作区的文件中执行精确的文本替换操作。
  en: Perform exact text replacement on files in the sandboxed workspace.
requiresSkills: []
requiresTools:
  - read_file
  - write_file
tags:
  - replace
  - file
inputSchema:
  type: object
  required:
    - path
    - oldText
    - newText
  properties:
    path:
      type: string
    oldText:
      type: string
    newText:
      type: string
outputSchema:
  type: object
  properties:
    success:
      type: boolean
    replacements:
      type: integer
errorCodes:
  - FILE_NOT_FOUND
  - TEXT_NOT_FOUND
  - FILE_EXTENSION_DENIED
