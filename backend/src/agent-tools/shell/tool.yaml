id: shell
source: builtin
tier: foundation
category: utility
enabledByDefault: false
displayName:
  zh: 受限命令执行
  en: Restricted Shell Execution
description:
  zh: 在沙箱环境中执行受限的 shell 命令。仅允许白名单命令，禁止破坏性操作。
  en: Execute restricted shell commands in a sandboxed environment. Only allowlisted commands are permitted; destructive operations are denied.
requiresSkills: []
requiresTools: []
tags:
  - shell
  - exec
  - command
inputSchema:
  type: object
  required:
    - command
  properties:
    command:
      type: string
    args:
      type: array
      items:
        type: string
    timeoutMs:
      type: integer
      default: 300000
outputSchema:
  type: object
  properties:
    exitCode:
      type: integer
    stdout:
      type: string
    stderr:
      type: string
errorCodes:
  - COMMAND_DENIED
  - COMMAND_TIMEOUT
  - OUTPUT_TOO_LARGE
