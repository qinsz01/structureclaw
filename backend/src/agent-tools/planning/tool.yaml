id: planning
source: builtin
tier: foundation
category: utility
enabledByDefault: true
displayName:
  zh: 任务规划
  en: Task Planning
description:
  zh: 将复杂工程请求分解为有序的子任务序列，辅助 agent 决策下一步动作。
  en: Decompose complex engineering requests into ordered sub-task sequences to assist agent action planning.
requiresSkills: []
requiresTools: []
tags:
  - planning
  - task
  - orchestration
inputSchema:
  type: object
  required:
    - goal
  properties:
    goal:
      type: string
    constraints:
      type: array
      items:
        type: string
outputSchema:
  type: object
  properties:
    steps:
      type: array
      items:
        type: object
        properties:
          order:
            type: integer
          action:
            type: string
          tool:
            type: string
errorCodes:
  - PLANNING_GOAL_AMBIGUOUS
