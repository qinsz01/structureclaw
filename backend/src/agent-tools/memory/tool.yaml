id: memory
source: builtin
tier: foundation
category: utility
enabledByDefault: true
displayName:
  zh: 上下文记忆
  en: Context Memory
description:
  zh: 在会话中存储、检索和清除上下文信息，用于跨轮次维持工程状态。
  en: Store, retrieve, and clear context within a session to maintain engineering state across turns.
requiresSkills: []
requiresTools: []
tags:
  - memory
  - context
  - session
inputSchema:
  type: object
  required:
    - action
  properties:
    action:
      enum:
        - store
        - retrieve
        - clear
    key:
      type: string
    value: {}
  oneOf:
    - properties:
        action:
          const: store
      required:
        - action
        - key
        - value
    - properties:
        action:
          const: retrieve
      required:
        - action
        - key
    - properties:
        action:
          const: clear
      required:
        - action
outputSchema:
  type: object
  properties:
    success:
      type: boolean
    value: {}
errorCodes:
  - MEMORY_KEY_NOT_FOUND
  - MEMORY_QUOTA_EXCEEDED
