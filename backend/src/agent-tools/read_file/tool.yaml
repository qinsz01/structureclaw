id: read_file
source: builtin
tier: foundation
category: utility
enabledByDefault: true
displayName:
  zh: 读取文件
  en: Read File
description:
  zh: 从沙箱工作区读取文本或 JSON 文件内容。
  en: Read text or JSON file content from the sandboxed workspace.
requiresSkills: []
requiresTools: []
tags:
  - file
  - read
  - workspace
inputSchema:
  type: object
  required:
    - path
  properties:
    path:
      type: string
    encoding:
      type: string
      default: utf-8
outputSchema:
  type: object
  properties:
    content:
      type: string
    sizeBytes:
      type: integer
errorCodes:
  - FILE_NOT_FOUND
  - FILE_TOO_LARGE
  - FILE_EXTENSION_DENIED
