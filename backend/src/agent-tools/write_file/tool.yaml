id: write_file
source: builtin
tier: foundation
category: utility
enabledByDefault: true
displayName:
  zh: 写入文件
  en: Write File
description:
  zh: 向沙箱工作区写入文本或 JSON 文件。受文件大小和扩展名白名单约束。
  en: Write text or JSON files to the sandboxed workspace. Subject to file size and extension allowlist constraints.
requiresSkills: []
requiresTools: []
tags:
  - file
  - write
  - workspace
inputSchema:
  type: object
  required:
    - path
    - content
  properties:
    path:
      type: string
    content:
      type: string
    encoding:
      type: string
      default: utf-8
outputSchema:
  type: object
  properties:
    success:
      type: boolean
    bytesWritten:
      type: integer
errorCodes:
  - FILE_EXTENSION_DENIED
  - FILE_TOO_LARGE
  - WRITE_OUTSIDE_SANDBOX
